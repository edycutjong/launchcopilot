name: Release

# Runs only after the CI/CD Pipeline finishes successfully on main.
# semantic-release reads the conventional commits since the last tag, computes
# the next version, updates CHANGELOG.md + package.json, tags the commit, and
# publishes a GitHub Release with generated notes.
on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]

permissions:
  contents: write # create tags, releases, and push the version bump
  issues: write # comment on released issues
  pull-requests: write # comment on released PRs

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Only for a green CI run that was triggered by a push to main.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
