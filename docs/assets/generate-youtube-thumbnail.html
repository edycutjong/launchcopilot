<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{--primary:#00d4ff;--accent:#ff2d95;--violet:#8b00ff;--teal:#00ffd1;--sunset:#ff6b35}
  *{margin:0;box-sizing:border-box}
  html,body{width:1280px;height:720px}
  .stage{position:relative;width:1280px;height:720px;overflow:hidden;background:
    radial-gradient(120% 80% at 50% 120%, rgba(255,107,53,.55), rgba(255,45,149,.3) 32%, transparent 60%),
    radial-gradient(60% 70% at 14% 8%, rgba(139,0,255,.55), transparent 60%),
    radial-gradient(70% 70% at 90% 30%, rgba(0,212,255,.34), transparent 60%),
    linear-gradient(160deg,#180835,#0d0221 55%,#07010f);
    font-family:'Space Grotesk','Segoe UI',system-ui,sans-serif;color:#fff}
  .grid{position:absolute;inset:0;background:
    linear-gradient(#00d4ff22 1px,transparent 1px) 0 0/100% 54px,
    linear-gradient(90deg,#00d4ff14 1px,transparent 1px) 0 0/54px 100%;
    -webkit-mask:linear-gradient(180deg,transparent 55%,#000 100%);mask:linear-gradient(180deg,transparent 55%,#000 100%);opacity:.55}
  .top{position:absolute;top:56px;left:64px;right:64px;display:flex;align-items:center;gap:22px}
  .top img{width:88px;height:88px;filter:drop-shadow(0 0 20px #8b00ff88)}
  .top .w{font-weight:700;font-size:60px;letter-spacing:-1.5px}
  .top .w .a{color:#eaf6ff}.top .w .b{background:linear-gradient(90deg,#00d4ff,#ff2d95);-webkit-background-clip:text;background-clip:text;color:transparent}
  .big{position:absolute;top:180px;left:64px;right:64px;font-weight:700;font-size:104px;line-height:.98;letter-spacing:-3px;text-shadow:0 0 40px #00d4ff33}
  .big .hl{background:linear-gradient(90deg,#00d4ff,#8b00ff 50%,#ff2d95);-webkit-background-clip:text;background-clip:text;color:transparent}
  .score{position:absolute;left:64px;bottom:150px;display:flex;align-items:center;gap:28px}
  .dial{width:150px;height:150px;border-radius:50%;display:flex;align-items:center;justify-content:center;font:800 62px 'Space Grotesk';position:relative}
  .fdial{border:9px solid #ff2d95;color:#ff2d95;box-shadow:0 0 34px #ff2d9577,inset 0 0 22px #ff2d9533;text-shadow:0 0 20px #ff2d95}
  .adial{border:9px solid #00d4ff;color:#00d4ff;box-shadow:0 0 40px #00d4ff88,inset 0 0 22px #00d4ff44;text-shadow:0 0 22px #00d4ff}
  .to{font:700 66px ui-monospace,Menlo,monospace;color:#8b7bd6}
  .cap{position:absolute;left:64px;bottom:64px;font:500 30px ui-monospace,Menlo,monospace;color:#c9bdf0;letter-spacing:.4px}
  .cap b{color:#00ffd1}
  .badge{position:absolute;right:70px;bottom:150px;width:300px;height:auto;text-align:center;transform:rotate(4deg)}
  .badge .l{font:700 26px ui-monospace,Menlo,monospace;color:#00d4ff;border:2px solid #00d4ff55;border-radius:16px;padding:16px;background:#0a1f28cc;box-shadow:0 0 40px #00d4ff33}
  .badge .l b{color:#fff}
</style></head>
<body>
<div class="stage">
  <div class="grid"></div>
  <div class="top"><img src="icon.svg" alt=""><div class="w"><span class="a">Launch</span><span class="b">Copilot</span></div></div>
  <div class="big">I graded my app's<br>store listing with <span class="hl">AI</span></div>
  <div class="score">
    <div class="dial fdial">F</div>
    <div class="to">→</div>
    <div class="dial adial">A</div>
  </div>
  <div class="cap">27 → 93 ASO score · <b>full launch kit in 60s</b></div>
  <div class="badge"><div class="l">28-rule engine<br><b>+ Claude pipeline</b></div></div>
</div>
</body></html>
