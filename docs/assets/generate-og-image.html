<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{--primary:#00d4ff;--accent:#ff2d95;--violet:#8b00ff;--teal:#00ffd1;--sunset:#ff6b35;--bg:#0d0221}
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px}
  .stage{position:relative;width:1200px;height:630px;overflow:hidden;background:
    radial-gradient(120% 90% at 50% 118%, rgba(255,107,53,.5), rgba(255,45,149,.28) 34%, transparent 62%),
    radial-gradient(60% 60% at 18% 12%, rgba(139,0,255,.5), transparent 60%),
    radial-gradient(60% 60% at 86% 26%, rgba(0,212,255,.32), transparent 60%),
    linear-gradient(160deg,#160730,#0d0221 55%,#07010f);
    font-family:'Space Grotesk','Segoe UI',system-ui,sans-serif;color:#fff}
  .grid{position:absolute;inset:0;background:
    linear-gradient(#00d4ff22 1px,transparent 1px) 0 0/100% 44px,
    linear-gradient(90deg,#00d4ff14 1px,transparent 1px) 0 0/44px 100%;
    -webkit-mask:linear-gradient(180deg,transparent 60%,#000 100%);mask:linear-gradient(180deg,transparent 60%,#000 100%);opacity:.5}
  .wrap{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 84px;gap:22px}
  .kicker{font:600 21px/1 ui-monospace,Menlo,monospace;letter-spacing:4px;color:var(--primary);text-shadow:0 0 14px #00d4ff88}
  .brand{display:flex;align-items:center;gap:26px}
  .brand img{width:104px;height:104px;filter:drop-shadow(0 0 22px #8b00ff88)}
  .word{font-weight:700;font-size:104px;line-height:.9;letter-spacing:-2px}
  .word .a{color:#eaf6ff;text-shadow:0 0 26px #ffffff44}
  .word .b{background:linear-gradient(90deg,#00d4ff,#8b00ff 52%,#ff2d95);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 26px #ff2d9566)}
  .tag{font-size:33px;font-weight:500;color:#e9e2ff;max-width:820px;line-height:1.28}
  .tag b{color:#fff}
  .score{display:flex;align-items:center;gap:18px;font:700 30px ui-monospace,Menlo,monospace}
  .chip{border:2px solid #ffffff22;border-radius:999px;padding:10px 22px;display:flex;align-items:center;gap:14px;background:#ffffff08}
  .f{color:var(--accent);text-shadow:0 0 16px #ff2d95}
  .arrow{color:#6b5a99}
  .a{color:var(--primary);text-shadow:0 0 16px #00d4ff}
  .pills{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
  .pill{font:600 17px ui-monospace,Menlo,monospace;padding:8px 16px;border-radius:12px;background:#141033;border:1.5px solid}
  .p1{border-color:var(--primary);color:#bff2ff}.p2{border-color:var(--accent);color:#ffc7e2}
  .p3{border-color:var(--violet);color:#d9bcff}.p4{border-color:var(--teal);color:#b6ffef}.p5{border-color:var(--sunset);color:#ffcbb0}
  .foot{position:absolute;left:84px;bottom:34px;font:500 18px ui-monospace,Menlo,monospace;color:#6b5a99;letter-spacing:.4px}
</style></head>
<body>
<div class="stage">
  <div class="grid"></div>
  <div class="wrap">
    <div class="kicker">APP-STORE OPTIMIZER × AI LAUNCH KIT</div>
    <div class="brand">
      <img src="icon.svg" alt="">
      <div class="word"><span class="a">Launch</span><span class="b">Copilot</span></div>
    </div>
    <div class="tag">Paste your app's store listing → a <b>graded, validated launch kit</b> in a minute.</div>
    <div class="score">
      <span class="chip">ASO SCORE&nbsp; <span class="f">27</span> <span class="arrow">→</span> <span class="a">93</span></span>
    </div>
    <div class="pills">
      <span class="pill p1">ASO rewrite</span><span class="pill p2">Product Hunt</span>
      <span class="pill p3">7-day social</span><span class="pill p4">Communities</span><span class="pill p5">Press</span>
    </div>
  </div>
  <div class="foot">Next.js · Claude · 28-rule engine · 130 tests · launchcopilot.app</div>
</div>
</body></html>
