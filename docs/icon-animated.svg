<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="LaunchCopilot animated icon — an ASO score gauge sweeps from F to A and a launch arrow lifts off">
  <defs>
    <linearGradient id="ai-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#170733"/><stop offset="1" stop-color="#0a0119"/>
    </linearGradient>
    <radialGradient id="ai-halo" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#8b00ff" stop-opacity="0.6"/>
      <stop offset="0.55" stop-color="#8b00ff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#8b00ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ai-gauge" gradientUnits="userSpaceOnUse" x1="150" y1="378" x2="362" y2="378">
      <stop offset="0" stop-color="#ff2d95"/><stop offset="0.5" stop-color="#ff6b35"/><stop offset="1" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="ai-arrow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="0.6" stop-color="#00d4ff"/><stop offset="1" stop-color="#00ffd1"/>
    </linearGradient>
    <filter id="ai-bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ai-soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <style>
      @keyframes ai-story { 0%{opacity:0} 2%{opacity:1} 95%{opacity:1} 100%{opacity:0} }
      @keyframes ai-arrowIn { 0%,55%{opacity:0} 61%{opacity:1} 95%{opacity:1} 100%{opacity:0} }
      @keyframes ai-halo { 0%,100%{opacity:.55} 88%{opacity:1} }
      @keyframes ai-exhaust { 0%,72%{opacity:0} 77%{opacity:1} 81%{opacity:.35} 85%{opacity:1} 93%{opacity:.9} 97%,100%{opacity:0} }
      @keyframes ai-breath { 0%,80%{opacity:0} 89%{opacity:.85} 97%,100%{opacity:0} }
      .ai-story { animation: ai-story 6s linear infinite; }
      .ai-arrowin { animation: ai-arrowIn 6s linear infinite; }
      .ai-halo { animation: ai-halo 6s ease-in-out infinite; }
      .ai-exhaust { animation: ai-exhaust 6s linear infinite; }
      .ai-breath { animation: ai-breath 6s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce){ *{animation:none!important} .ai-story,.ai-arrowin{opacity:1} }
    </style>
  </defs>

  <!-- static base -->
  <rect x="16" y="16" width="480" height="480" rx="118" fill="url(#ai-tile)"/>
  <rect class="ai-halo" x="16" y="16" width="480" height="480" rx="118" fill="url(#ai-halo)"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="117.5" fill="none" stroke="#00d4ff" stroke-opacity="0.22" stroke-width="1.5"/>

  <g class="ai-story">
    <!-- circuit traces draw in -->
    <g stroke="#00ffd1" stroke-opacity="0.55" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M60 96 h44 l18 18 v34" pathLength="100" stroke-dasharray="100 100">
        <animate attributeName="stroke-dashoffset" dur="6s" repeatCount="indefinite" values="100;100;0;0" keyTimes="0;0.06;0.22;1"/></path>
      <path d="M452 118 h-40 l-16 16" pathLength="100" stroke-dasharray="100 100">
        <animate attributeName="stroke-dashoffset" dur="6s" repeatCount="indefinite" values="100;100;0;0" keyTimes="0;0.08;0.24;1"/></path>
      <path d="M76 430 v-34 l20-20" pathLength="100" stroke-dasharray="100 100">
        <animate attributeName="stroke-dashoffset" dur="6s" repeatCount="indefinite" values="100;100;0;0" keyTimes="0;0.10;0.26;1"/></path>
      <path d="M440 424 h-38 l-18-18 v-26" pathLength="100" stroke-dasharray="100 100">
        <animate attributeName="stroke-dashoffset" dur="6s" repeatCount="indefinite" values="100;100;0;0" keyTimes="0;0.12;0.28;1"/></path>
      <circle cx="60" cy="96" r="5" fill="#00ffd1" stroke="none"/><circle cx="452" cy="118" r="5" fill="#00ffd1" stroke="none"/>
      <circle cx="76" cy="430" r="5" fill="#00ffd1" stroke="none"/><circle cx="440" cy="424" r="5" fill="#00ffd1" stroke="none"/>
    </g>

    <!-- gauge track + drawing arc -->
    <path d="M149.9 378.1 A150 150 0 1 1 362.1 378.1" fill="none" stroke="#0d0221" stroke-opacity="0.9" stroke-width="46" stroke-linecap="round"/>
    <path d="M149.9 378.1 A150 150 0 1 1 362.1 378.1" fill="none" stroke="url(#ai-gauge)" stroke-width="30" stroke-linecap="round"
          filter="url(#ai-bloom)" pathLength="100" stroke-dasharray="100 100">
      <animate attributeName="stroke-dashoffset" dur="6s" repeatCount="indefinite" values="100;100;0;0;0" keyTimes="0;0.20;0.56;0.96;1"/>
    </path>

    <!-- start node (F) -->
    <circle cx="149.9" cy="378.1" r="12" fill="#ff2d95" filter="url(#ai-bloom)">
      <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0;0;1;1" keyTimes="0;0.18;0.24;1"/>
    </circle>

    <!-- ripple burst at the A tip -->
    <circle cx="362.1" cy="378.1" r="0" fill="none" stroke="#00d4ff" stroke-width="4">
      <animate attributeName="r" dur="6s" repeatCount="indefinite" values="4;4;52;52" keyTimes="0;0.54;0.66;1"/>
      <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0;0;0.9;0;0" keyTimes="0;0.54;0.58;0.66;1"/>
    </circle>

    <!-- travelling tip node, rides the gauge as it draws -->
    <g filter="url(#ai-bloom)">
      <circle cx="0" cy="0" r="14" fill="#00d4ff">
        <animate attributeName="r" dur="6s" repeatCount="indefinite" values="12;12;12;18;15;15" keyTimes="0;0.20;0.55;0.60;0.66;1"/>
      </circle>
      <circle cx="0" cy="0" r="6" fill="#ffffff"/>
      <animateMotion dur="6s" repeatCount="indefinite" rotate="none"
        path="M149.9 378.1 A150 150 0 1 1 362.1 378.1" keyPoints="0;0;1;1" keyTimes="0;0.20;0.56;1" calcMode="linear"/>
    </g>

    <!-- launch comet shooting up out of the top -->
    <ellipse cx="256" cy="150" rx="16" ry="40" fill="#ff2d95" filter="url(#ai-soft)">
      <animate attributeName="cy" dur="6s" repeatCount="indefinite" values="230;230;-60;-60" keyTimes="0;0.60;0.82;1"/>
      <animate attributeName="opacity" dur="6s" repeatCount="indefinite" values="0;0;0.85;0;0" keyTimes="0;0.60;0.70;0.82;1"/>
    </ellipse>

    <!-- launch arrow -->
    <g class="ai-arrowin">
      <g>
        <g filter="url(#ai-bloom)">
          <path d="M256 150 L320 222 L288 222 L288 322 Q288 336 274 336 L238 336 Q224 336 224 322 L224 222 L192 222 Z" fill="url(#ai-arrow)"/>
        </g>
        <animateTransform attributeName="transform" type="translate" dur="6s" repeatCount="indefinite"
          values="0,80; 0,80; 0,-14; 0,4; 0,0; 0,0" keyTimes="0;0.55;0.66;0.71;0.75;1" calcMode="spline"
          keySplines="0 0 1 1;0.2 0.8 0.3 1;0.4 0 0.6 1;0.4 0 0.6 1;0 0 1 1"/>
      </g>
      <g class="ai-exhaust" stroke-linecap="round" filter="url(#ai-bloom)">
        <line x1="256" y1="352" x2="256" y2="376" stroke="#ff6b35" stroke-width="9"/>
        <line x1="232" y1="350" x2="228" y2="368" stroke="#ff2d95" stroke-width="7"/>
        <line x1="280" y1="350" x2="284" y2="368" stroke="#ff2d95" stroke-width="7"/>
      </g>
    </g>

    <!-- final glow breath -->
    <g class="ai-breath" filter="url(#ai-soft)">
      <path d="M149.9 378.1 A150 150 0 1 1 362.1 378.1" fill="none" stroke="#00d4ff" stroke-width="26" stroke-linecap="round" opacity="0.8"/>
      <path d="M256 150 L320 222 L288 222 L288 322 L224 322 L224 222 L192 222 Z" fill="#00d4ff" opacity="0.7"/>
    </g>
  </g>
</svg>
